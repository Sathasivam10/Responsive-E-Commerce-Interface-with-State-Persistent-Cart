<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Shop - Products</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">SaaShop</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="products.html" class="active">Products</a>
                <a href="cart.html">Cart <span id="cart-badge" class="badge">0</span></a>
                <a href="login.html" id="nav-login">Login</a>
                <a href="#" id="nav-logout" style="display: none;">Logout</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="page-header">
            <h2>Our Products</h2>
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Search products...">
            </div>
        </div>

        <!-- Loader -->
        <div id="loader" class="loader"></div>

        <!-- Alerts -->
        <div id="alert-container"></div>

        <section class="product-grid" id="product-grid">
            <!-- Products will be dynamically inserted here -->
        </section>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/products.js"></script>
</body>
</html>
