<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Shop - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">SaaShop</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="products.html">Products</a>
                <a href="cart.html">Cart <span id="cart-badge" class="badge">0</span></a>
            </div>
        </div>
    </nav>

    <main class="container">
        <div id="alert-container"></div>
        <div class="auth-container">
            <!-- Login Form -->
            <div class="auth-card" id="login-card">
                <h2>Welcome Back</h2>
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-email">Email Address</label>
                        <input type="email" id="login-email" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" required>
                    </div>
                    <button type="submit" class="btn btn-primary full-width">Sign In</button>
                    <div class="auth-links">
                        Don't have an account? <a href="#" id="show-register">Register here</a>
                    </div>
                </form>
            </div>

            <!-- Register Form -->
            <div class="auth-card" id="register-card" style="display: none;">
                <h2>Create Account</h2>
                <form id="register-form">
                    <div class="form-group">
                        <label for="reg-name">Full Name</label>
                        <input type="text" id="reg-name" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-email">Email Address</label>
                        <input type="email" id="reg-email" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" required>
                    </div>
                    <button type="submit" class="btn btn-primary full-width">Sign Up</button>
                    <div class="auth-links">
                        Already have an account? <a href="#" id="show-login">Login here</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    <script>
        document.getElementById('show-register').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('login-card').style.display = 'none';
            document.getElementById('register-card').style.display = 'block';
        });
        document.getElementById('show-login').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('register-card').style.display = 'none';
            document.getElementById('login-card').style.display = 'block';
        });

        // Initialize user session check inside inline script specific to this page
        if(localStorage.getItem('token')) {
            window.location.href = 'index.html'; // Already logged in
        }
    </script>
</body>
</html>
