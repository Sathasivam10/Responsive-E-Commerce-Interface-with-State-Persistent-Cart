<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Shop - Cart</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">SaaShop</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="products.html">Products</a>
                <a href="cart.html" class="active">Cart <span id="cart-badge" class="badge">0</span></a>
                <a href="login.html" id="nav-login">Login</a>
                <a href="#" id="nav-logout" style="display: none;">Logout</a>
            </div>
        </div>
    </nav>

    <main class="container cart-layout">
        <div class="cart-items-section">
            <h2>Your Shopping Cart</h2>
            <div id="cart-items-container">
                <!-- Cart items dynamically rendered -->
            </div>
            <div id="empty-cart-message" style="display: none;" class="empty-state">
                <p>Your cart is empty.</p>
                <a href="products.html" class="btn btn-secondary">Browse Products</a>
            </div>
        </div>
        
        <div class="cart-summary-section">
            <div class="card summary-card">
                <h3>Order Summary</h3>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="summary-subtotal">₹0.00</span>
                </div>
                <div class="summary-row">
                    <span>Tax (18%)</span>
                    <span id="summary-tax">₹0.00</span>
                </div>
                <hr>
                <div class="summary-row total">
                    <span>Total</span>
                    <span id="summary-total">₹0.00</span>
                </div>
                <button class="btn btn-primary full-width" id="checkout-btn">Proceed to Checkout</button>
            </div>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/renderCart.js"></script>
</body>
</html>
